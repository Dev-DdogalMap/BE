spring:
  application:
    name: ddogalmap

  datasource:
    url: ${DB_URL} #${DB_URL:jdbc:postgresql://ddogalmap-db.crq82os4wbyn.ap-northeast-2.rds.amazonaws.com/ddogalmap}
    username: ${DB_USERNAME} #${DB_USERNAME:ddogalmap_user}
    password: ${DB_PASSWORD} #${DB_PASSWORD:ddogalmap0610!}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 800000

  jpa:
    hibernate:
      ddl-auto: update #validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        default_schema: ddogalmap_schema
        format_sql: true
        use_sql_comments: true
        highlight_sql: true
        jdbc:
          time_zone: Asia/Seoul
    open-in-view: false

  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID:AKIA2JF7BTKPTRHVC3OU}
        secret-key: ${AWS_SECRET_ACCESS_KEY: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}
      region:
        static: ap-northeast-2
      s3:
        bucket: ddogalmap-images

jwt:
  secret: ${JWT_SECRET:ddogalmap-jwt-secret-key-must-be-at-least-32-characters}
  access-token-expiration-ms: 1800000 # 30분
  refresh-token-expiration-ms: 1209600000 # 14일

kakao:
  client-id: ${KAKAO_REST_API_KEY:99d9114968f59241419a64a4209ed0cf}
  client-secret: ${KAKAO_CLIENT_SECRET:tALhs4POJB3VIG9sgWduoP5ty7SpzEtb}
  redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/api/auth/kakao/callback%7D
  auth-uri: https://kauth.kakao.com/oauth/authorize
  token-uri: https://kauth.kakao.com/oauth/token
  user-info-uri: https://kapi.kakao.com/v2/user/me

frontend:
  url: ${FRONTEND_URL:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      show-details: never

  metrics:
    tags:
      application: ddogalmap

seoul-open-api:
  base-url: http://openapi.seoul.go.kr:8088/
  key: ${SEOUL_OPEN_API_KEY:7a526a775561676f3337514870546f}
  service-name: LOCALDATA_072404
  page-size: 1000